<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Dashboard - Screlia Studio v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState(null);
            const [metadata, setMetadata] = useState(null);
            const [stats, setStats] = useState(null);

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 5000);
                return () => clearInterval(interval);
            }, []);

            const fetchData = async () => {
                try {
                    const [indexRes, metaRes, statsRes] = await Promise.all([
                        fetch('http://localhost:5000/api/index'),
                        fetch('http://localhost:5000/api/metadata'),
                        fetch('http://localhost:5000/api/statistics')
                    ]);
                    setData(await indexRes.json());
                    setMetadata(await metaRes.json());
                    setStats(await statsRes.json());
                } catch (error) {
                    console.error('Data fetch error:', error);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="gradient-bg text-white py-8 shadow-xl">
                        <div className="max-w-7xl mx-auto px-4">
                            <h1 className="text-4xl font-bold flex items-center gap-3">📊 React Dashboard Screlia Studio v2.0</h1>
                            <p className="text-gray-200 mt-2">Canlı Veri Paneli</p>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Quick Stats */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                            <div className="glass-effect rounded-2xl p-6 shadow-lg card-hover border border-gray-200">
                                <div className="text-4xl font-bold text-blue-600 mb-2">{stats?.total_queries || 0}</div>
                                <p className="text-gray-600 font-semibold">📝 Toplam Sorgular</p>
                            </div>
                            <div className="glass-effect rounded-2xl p-6 shadow-lg card-hover border border-gray-200">
                                <div className="text-4xl font-bold text-green-600 mb-2">{stats?.today_queries || 0}</div>
                                <p className="text-gray-600 font-semibold">📅 Bugün Sorgular</p>
                            </div>
                            <div className="glass-effect rounded-2xl p-6 shadow-lg card-hover border border-gray-200">
                                <div className="text-4xl font-bold text-purple-600 mb-2">{stats?.total_favorites || 0}</div>
                                <p className="text-gray-600 font-semibold">⭐ Favoriler</p>
                            </div>
                            <div className="glass-effect rounded-2xl p-6 shadow-lg card-hover border border-gray-200">
                                <div className="text-4xl font-bold text-yellow-600 mb-2">{stats?.total_tokens || 0}</div>
                                <p className="text-gray-600 font-semibold">🔑 Token Kullanıldı</p>
                            </div>
                        </div>

                        {/* Main Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            {/* Pages */}
                            <div className="glass-effect rounded-2xl p-6 shadow-lg border border-gray-200">
                                <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">📄 Sayfalar</h3>
                                <div className="space-y-3">
                                    {data?.pages?.map(page => (
                                        <div key={page.id} className="bg-blue-50 p-3 rounded-lg border-l-4 border-blue-500">
                                            <p className="font-semibold text-gray-800">{page.title}</p>
                                            <p className="text-sm text-gray-600 mt-1">{page.description}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Services */}
                            <div className="glass-effect rounded-2xl p-6 shadow-lg border border-gray-200">
                                <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">🔌 API Servisleri</h3>
                                <div className="space-y-3">
                                    {data?.services?.map(service => (
                                        <div key={service.name} className="bg-green-50 p-3 rounded-lg border-l-4 border-green-500">
                                            <p className="font-semibold text-gray-800">{service.name}</p>
                                            <code className="text-xs text-green-700 bg-gray-100 px-2 py-1 rounded mt-1 inline-block">{service.endpoint}</code>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* App Info */}
                            <div className="glass-effect rounded-2xl p-6 shadow-lg border border-gray-200">
                                <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">ℹ️ Uygulama Detayları</h3>
                                {metadata && (
                                    <div className="space-y-3">
                                        <div className="bg-purple-50 p-3 rounded-lg">
                                            <p className="text-sm text-gray-600">Adı</p>
                                            <p className="font-semibold text-gray-800">{metadata.app_name}</p>
                                        </div>
                                        <div className="bg-purple-50 p-3 rounded-lg">
                                            <p className="text-sm text-gray-600">Versiyon</p>
                                            <p className="font-semibold text-gray-800">{metadata.version}</p>
                                        </div>
                                        <div className="bg-purple-50 p-3 rounded-lg">
                                            <p className="text-sm text-gray-600">AI Sağlayıcı</p>
                                            <p className="font-semibold text-gray-800">{metadata.services?.ai_provider}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Features */}
                        <div className="mt-8 glass-effect rounded-2xl p-6 shadow-lg border border-gray-200">
                            <h3 className="text-2xl font-bold text-gray-800 mb-4 flex items-center gap-2">✨ Özellikler</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {metadata?.features?.map((feature, idx) => (
                                    <div key={idx} className="bg-gradient-to-r from-blue-100 to-purple-100 p-4 rounded-lg border-l-4 border-blue-500">
                                        <p className="text-gray-800 font-semibold">✓ {feature}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Action Buttons */}
                        <div className="mt-8 flex gap-4 justify-center flex-wrap">
                            <button onClick={fetchData} className="px-8 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-lg font-semibold hover:shadow-lg transition">
                                🔄 Verileri Yenile
                            </button>
                            <a href="/" className="px-8 py-3 bg-gray-600 text-white rounded-lg font-semibold hover:shadow-lg transition">
                                ← Ana Sayfa
                            </a>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-900 text-gray-400 text-center py-6 mt-12">
                        <p>🚀 Screlia Studio © 2026 | React Dashboard v2.0 | Powered by Tailwind CSS</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
